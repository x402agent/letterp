<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>P Agent Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">P Token and Agent Console</p>
          <h1>Explore p-tokens, plan agents, and draft Pinocchio deployments.</h1>
        </div>
        <div class="status-stack">
          <div class="status" id="status">Connecting</div>
          <button class="ghost" id="workspace-button" type="button">Workspace</button>
          <button class="ghost" id="pinocchio-button" type="button">Pinocchio</button>
        </div>
      </header>

      <section class="toolbar">
        <form id="explore-form" class="search">
          <label>
            Explore
            <input name="query" value="8cHzQHUS2s2h8TzCmfqPKYiM4dSt4roa3n7MyRLApump" />
          </label>
          <label>
            Network
            <select name="network">
              <option value="solana-devnet">Devnet</option>
              <option value="solana-mainnet">Mainnet</option>
            </select>
          </label>
          <button type="submit">Run</button>
        </form>
      </section>

      <section class="grid">
        <form class="panel span-2" id="launch-form">
          <div class="panel-title">
            <h2>Launch Plan</h2>
            <button type="submit">Generate</button>
          </div>
          <div class="split">
            <label>Symbol <input name="symbol" value="CLAWD" /></label>
            <label>Name <input name="name" value="Solana Clawd p-token" /></label>
          </div>
          <label>Metadata URI <input name="uri" value="https://solanaclawd.com/clawd.json" /></label>
          <div class="split three">
            <label>Supply <input name="supply" type="number" value="1000000000" /></label>
            <label>Decimals <input name="decimals" type="number" value="9" /></label>
            <label>Fee bps <input name="feeBps" type="number" value="100" /></label>
          </div>
          <div class="split three">
            <label>Virtual SOL <input name="virtualSol" type="number" step="0.01" value="30" /></label>
            <label>Virtual token <input name="virtualToken" type="number" value="1073000000" /></label>
            <label>Graduation SOL <input name="graduationSol" type="number" value="85" /></label>
          </div>
        </form>

        <form class="panel span-2" id="agent-form">
          <div class="panel-title">
            <h2>Agent Plan</h2>
            <button type="submit">Draft</button>
          </div>
          <div class="split">
            <label>Agent <input name="agentName" value="Solana Clawd" /></label>
            <label>Token symbol <input name="symbol" value="CLAWD" /></label>
          </div>
          <label>Core asset <input name="coreAsset" value="create-new-core-asset" /></label>
          <div class="split">
            <label>Owner <input name="owner" value="&lt;owner-wallet-or-multisig&gt;" /></label>
            <label>Executive <input name="executive" placeholder="optional delegate" /></label>
          </div>
          <label>Endpoint <input name="endpoint" value="https://solanaclawd.com/agent.json" /></label>
          <label>Capabilities <input name="capabilities" value="launch,trade,quote,settle,delegate" /></label>
        </form>

        <form class="panel" id="quote-form">
          <div class="panel-title">
            <h2>Curve Quote</h2>
            <button type="submit">Quote</button>
          </div>
          <div class="segmented">
            <label><input type="radio" name="side" value="buy" checked /> Buy</label>
            <label><input type="radio" name="side" value="sell" /> Sell</label>
          </div>
          <label>SOL in <input name="sol" type="number" step="0.01" value="1" /></label>
          <label>Tokens in <input name="tokens" type="number" value="1000000" /></label>
        </form>

        <form class="panel" id="program-form">
          <div class="panel-title">
            <h2>Program Draft</h2>
            <button type="submit">Draft</button>
          </div>
          <label>
            Target
            <select name="target">
              <option value="devnet">Devnet</option>
              <option value="mainnet-beta">Mainnet</option>
            </select>
          </label>
          <label>Agent program <input name="agentProgramId" placeholder="P_AGENT_TOKEN_PROGRAM_ID" /></label>
          <label>Launchpad program <input name="launchpadProgramId" placeholder="P_TOKEN_LAUNCHPAD_PROGRAM_ID" /></label>
          <label>Upgrade authority <input name="upgradeAuthority" value="&lt;upgrade-authority-multisig&gt;" /></label>
        </form>

        <form class="panel" id="perp-form">
          <div class="panel-title">
            <h2>Perp Intent</h2>
            <button type="submit">Plan</button>
          </div>
          <div class="segmented">
            <label><input type="radio" name="perpSide" value="long" checked /> Long</label>
            <label><input type="radio" name="perpSide" value="short" /> Short</label>
          </div>
          <label>Collateral SOL <input name="collateralSol" type="number" step="0.01" value="1" /></label>
          <label>Leverage <input name="leverage" type="number" step="0.1" value="2" /></label>
          <label>Actor <input name="actor" value="agent-with-human-review" /></label>
        </form>

        <form class="panel" id="inspect-form">
          <div class="panel-title">
            <h2>Mint Inspector</h2>
            <button type="submit">Inspect</button>
          </div>
          <label>Mint <input name="mint" value="8cHzQHUS2s2h8TzCmfqPKYiM4dSt4roa3n7MyRLApump" /></label>
          <label>RPC <input name="rpc" placeholder="Defaults to configured RPC" /></label>
        </form>
      </section>

      <section class="output-band">
        <div class="tabs">
          <button class="active" data-output="explore-output">Explore</button>
          <button data-output="pinocchio-output">Pinocchio</button>
          <button data-output="plan-output">Launch</button>
          <button data-output="agent-output">Agent</button>
          <button data-output="program-output">Program</button>
          <button data-output="quote-output">Quote</button>
          <button data-output="perp-output">Perp</button>
          <button data-output="inspect-output">Inspect</button>
          <button data-output="registry-output">Registry</button>
        </div>
        <pre id="explore-output" class="output active"></pre>
        <pre id="pinocchio-output" class="output"></pre>
        <pre id="plan-output" class="output"></pre>
        <pre id="agent-output" class="output"></pre>
        <pre id="program-output" class="output"></pre>
        <pre id="quote-output" class="output"></pre>
        <pre id="perp-output" class="output"></pre>
        <pre id="inspect-output" class="output"></pre>
        <pre id="registry-output" class="output"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
