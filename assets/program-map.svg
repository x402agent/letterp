<svg width="960" height="300" viewBox="0 0 960 300" role="img" aria-label="Animated Pinocchio program map" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="300" rx="18" fill="#080b10"/>
  <style>
    .node {
      fill: #101821;
      stroke: #7ee3c1;
      stroke-width: 1.4;
      filter: drop-shadow(0 0 7px rgba(126, 227, 193, 0.45));
      animation: pulse 2.6s ease-in-out infinite;
    }
    .core {
      stroke: #9945ff;
      filter: drop-shadow(0 0 9px rgba(153, 69, 255, 0.6));
    }
    .label {
      fill: #f5f7fb;
      font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-anchor: middle;
    }
    .small {
      fill: #aeb8c7;
      font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-anchor: middle;
    }
    .edge {
      stroke: #7ee3c1;
      stroke-width: 2;
      stroke-dasharray: 8 8;
      animation: dash 1.8s linear infinite;
    }
    .edge-purple {
      stroke: #9945ff;
    }
    @keyframes dash {
      to { stroke-dashoffset: -32; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.76; }
      50% { opacity: 1; }
    }
  </style>
  <line class="edge edge-purple" x1="180" y1="88" x2="390" y2="88"/>
  <line class="edge edge-purple" x1="570" y1="88" x2="780" y2="88"/>
  <line class="edge" x1="480" y1="124" x2="250" y2="210"/>
  <line class="edge" x1="480" y1="124" x2="480" y2="210"/>
  <line class="edge" x1="480" y1="124" x2="710" y2="210"/>
  <rect class="node core" x="60" y="52" width="240" height="72" rx="10"/>
  <text class="label" x="180" y="83">Solana Clawd</text>
  <text class="small" x="180" y="105">agents + builders</text>
  <rect class="node core" x="360" y="52" width="240" height="72" rx="10"/>
  <text class="label" x="480" y="83">Pinocchio SDK</text>
  <text class="small" x="480" y="105">AccountView + Address</text>
  <rect class="node core" x="660" y="52" width="240" height="72" rx="10"/>
  <text class="label" x="780" y="83">p-token rails</text>
  <text class="small" x="780" y="105">mint + transfer + x402</text>
  <rect class="node" x="80" y="198" width="340" height="62" rx="10"/>
  <text class="label" x="250" y="224">p-agent-token</text>
  <text class="small" x="250" y="244">Core asset binding + delegation</text>
  <rect class="node" x="440" y="198" width="80" height="62" rx="10"/>
  <text class="label" x="480" y="224">P</text>
  <text class="small" x="480" y="244">zero-copy</text>
  <rect class="node" x="560" y="198" width="300" height="62" rx="10"/>
  <text class="label" x="710" y="224">bonding curve launchpad</text>
  <text class="small" x="710" y="244">buy + sell + graduate</text>
</svg>
