name: Publish

on:
  workflow_dispatch:
    inputs:
      crate:
        description: Crate
        required: true
        default: sdk
        type: choice
        options:
          - programs/associated-token-account
          - programs/memo
          - programs/system
          - programs/token
          - programs/token-2022
          - sdk
      level:
        description: Level
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - rc
          - beta
          - alpha
          - release
          - version
      version:
        description: Version (used with level "version")
        required: false
        type: string
      dry_run:
        description: Dry run
        required: true
        default: true
        type: boolean
      create_release:
        description: Create a GitHub release
        required: true
        type: boolean
        default: true

env:
  CACHE: true

jobs:
  semver_check:
    name: Check Semver
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          cargo-cache-key: cargo-semver-checks
          toolchain: test
          components: release, semver-checks

      - name: Set Version
        run: |
          if [ "${{ inputs.level }}" == "version" ]; then
            LEVEL=${{ inputs.version }}
          else
            LEVEL=${{ inputs.level }}
          fi

          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          cargo release $LEVEL --manifest-path ${{ inputs.crate }}/Cargo.toml --no-tag --no-publish --no-push --no-confirm --execute

      - name: Check semver
        run: |
          pnpm semver ${{ inputs.crate }}

      - name: Summary
        run: |
          version=$(awk -F'"' '/^version = /{print $2; exit}' "${CRATE}/Cargo.toml")
          {
            echo "Crate: ${CRATE}"
            echo "Version: ${version}"
            echo "Ref: ${GITHUB_SHA} (https://github.com/${REPO}/commit/${GITHUB_SHA})"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          CRATE: ${{ inputs.crate }}
          REPO: ${{ github.repository }}


  publish_release:
    name: Publish
    runs-on: ubuntu-latest
    environment: ${{ inputs.dry_run && 'dry-run' || 'prod' }}
    needs: semver_check
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ inputs.dry_run && github.token || secrets.ANZA_TEAM_PAT }}
          fetch-depth: 0 # get the whole history for git-cliff

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          cargo-cache-key: cargo-publish
          toolchain: test
          components: release
          solana: true

      - name: Build
        run: pnpm build-sbf ${{ inputs.crate }}

      - name: Test
        run: pnpm test ${{ inputs.crate }}

      - name: Set Git Author
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      - name: Authorization
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4
        if: github.event.inputs.dry_run != 'true'
        id: auth

      - name: Publish Crate
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          if [ "${{ inputs.level }}" == "version" ]; then
            LEVEL=${{ inputs.version }}
          else
            LEVEL=${{ inputs.level }}
          fi

          if [ "${{ inputs.dry_run }}" == "true" ]; then
            OPTIONS="--dry-run"
          else
            OPTIONS=""
          fi

          pnpm tsx ./scripts/publish.mts ${{ inputs.crate }} $LEVEL $OPTIONS

      - name: Generate a changelog
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.create_release == 'true'
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.8.0
        with:
          config: ".github/cliff.toml"
          args: ${{ steps.publish.outputs.old_git_tag }}..HEAD --include-path "${{ inputs.crate }}/**" --github-repo ${{ github.repository }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.create_release == 'true'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          tag: ${{ steps.publish.outputs.new_git_tag }}
          bodyFile: CHANGELOG.md
